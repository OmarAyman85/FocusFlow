<div class="fixed inset-0 bg-black/40 flex items-center justify-center p-4 z-50" (click)="close.emit()">
  <div class="bg-white rounded-xl shadow-xl w-full max-w-lg p-6" (click)="$event.stopPropagation()">
    <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Title</label>
        <input
          formControlName="title"
          [readonly]="!canWrite"
          class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
        />
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Description</label>
        <textarea
          formControlName="description"
          [readonly]="!canWrite"
          rows="3"
          class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
        ></textarea>
      </div>

      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Priority</label>
          <select
            formControlName="priority"
            [disabled]="!canWrite"
            class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
          >
            <option value="low">Low</option>
            <option value="medium">Medium</option>
            <option value="high">High</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Due date</label>
          <input
            type="date"
            formControlName="dueDate"
            [readonly]="!canWrite"
            class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
          />
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Assignee</label>
        <select
          [disabled]="!canWrite"
          (change)="onAssigneeChange($event)"
          class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
        >
          <option value="" [selected]="!card.assigneeId">Unassigned</option>
          @for (m of members; track m.id) {
            <option [value]="m.userId" [selected]="m.userId === card.assigneeId">
              {{ m.user.name }}
            </option>
          }
        </select>
      </div>

      <div class="flex items-center justify-between pt-2">
        @if (canWrite) {
          <button type="button" (click)="delete.emit()" class="text-sm font-medium text-red-600 hover:underline">
            Delete card
          </button>
        } @else {
          <span></span>
        }
        <div class="flex gap-2">
          <button type="button" (click)="close.emit()" class="text-sm font-medium text-slate-500 px-4 py-2">
            Close
          </button>
          @if (canWrite) {
            <button type="submit" class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium rounded-lg px-4 py-2 transition">
              Save
            </button>
          }
        </div>
      </div>
    </form>
  </div>
</div>
