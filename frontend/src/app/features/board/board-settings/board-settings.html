<div class="fixed inset-0 bg-black/40 flex items-center justify-center p-4 z-50" (click)="close.emit()">
  <div class="bg-white rounded-xl shadow-xl w-full max-w-md p-6" (click)="$event.stopPropagation()">
    <h2 class="text-lg font-bold text-slate-900 mb-4">Board settings</h2>

    <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Name</label>
        <input
          formControlName="name"
          [readonly]="!canManage"
          class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
        />
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Description</label>
        <textarea
          formControlName="description"
          [readonly]="!canManage"
          rows="2"
          class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
        ></textarea>
      </div>

      @if (canManage) {
        <button type="submit" class="text-sm font-medium bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg px-4 py-2 transition">
          Save changes
        </button>
      }
    </form>

    @if (isOwner) {
      <div class="mt-6 pt-4 border-t border-slate-100 flex items-center justify-between">
        <div>
          <p class="text-sm font-medium text-slate-900">Visibility</p>
          <p class="text-xs text-slate-400">{{ board.visibility === 'public' ? 'Anyone with the link can view' : 'Only members can view' }}</p>
        </div>
        <button
          (click)="toggleVisibility()"
          class="text-xs font-medium rounded-full px-3 py-1.5"
          [class.bg-emerald-100]="board.visibility === 'public'"
          [class.text-emerald-700]="board.visibility === 'public'"
          [class.bg-slate-100]="board.visibility === 'private'"
          [class.text-slate-700]="board.visibility === 'private'"
        >
          Make {{ board.visibility === 'public' ? 'private' : 'public' }}
        </button>
      </div>
    }

    <div class="mt-6 pt-4 border-t border-slate-100 flex items-center justify-between">
      @if (isOwner) {
        <button (click)="deleteBoard.emit()" class="text-sm font-medium text-red-600 hover:underline">
          Delete board
        </button>
      } @else {
        <button (click)="leaveBoard.emit()" class="text-sm font-medium text-red-600 hover:underline">
          Leave board
        </button>
      }
      <button (click)="close.emit()" class="text-sm font-medium text-slate-500 px-4 py-2">Close</button>
    </div>
  </div>
</div>
