<div class="bg-slate-100 rounded-xl p-3 w-72 flex-shrink-0 flex flex-col max-h-full">
  <div class="flex items-center justify-between mb-3">
    @if (editingName()) {
      <form [formGroup]="nameForm" (ngSubmit)="submitRename()" class="flex-1">
        <input
          formControlName="name"
          (blur)="submitRename()"
          autofocus
          class="w-full rounded border border-indigo-300 px-2 py-1 text-sm font-semibold"
        />
      </form>
    } @else {
      <h3
        (click)="canWrite && startRename()"
        class="font-semibold text-slate-700 text-sm"
        [class.cursor-pointer]="canWrite"
      >
        {{ list.name }}
      </h3>
    }

    @if (canWrite) {
      <button (click)="deleteList.emit()" class="text-slate-400 hover:text-red-500 text-xs">✕</button>
    }
  </div>

  <div
    cdkDropList
    [cdkDropListData]="list.cards"
    [cdkDropListDisabled]="!canWrite"
    (cdkDropListDropped)="dropped.emit($event)"
    class="flex flex-col gap-2 overflow-y-auto flex-1 min-h-[2rem]"
  >
    @for (card of list.cards; track card.id) {
      <div cdkDrag [cdkDragData]="card" [cdkDragDisabled]="!canWrite">
        <app-board-card [card]="card" (open)="cardClicked.emit(card)" />
      </div>
    }
  </div>

  @if (canWrite) {
    @if (addingCard()) {
      <form [formGroup]="cardForm" (ngSubmit)="submitAddCard()" class="mt-2 space-y-1">
        <input
          formControlName="title"
          placeholder="Card title"
          autofocus
          class="w-full rounded border border-slate-300 px-2 py-1.5 text-sm"
        />
        <div class="flex gap-2">
          <button type="submit" class="text-xs font-medium bg-indigo-600 text-white rounded px-2 py-1">
            Add
          </button>
          <button type="button" (click)="addingCard.set(false)" class="text-xs text-slate-500">
            Cancel
          </button>
        </div>
      </form>
    } @else {
      <button
        (click)="startAddCard()"
        class="mt-2 text-xs font-medium text-slate-500 hover:text-slate-800 text-left"
      >
        + Add card
      </button>
    }
  }
</div>
