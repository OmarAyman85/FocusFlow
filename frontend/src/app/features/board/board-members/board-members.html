<div class="fixed inset-0 bg-black/40 flex items-center justify-center p-4 z-50" (click)="close.emit()">
  <div class="bg-white rounded-xl shadow-xl w-full max-w-md p-6" (click)="$event.stopPropagation()">
    <h2 class="text-lg font-bold text-slate-900 mb-4">Members</h2>

    <div class="space-y-2 max-h-72 overflow-y-auto">
      @for (m of members; track m.id) {
        <div class="flex items-center justify-between py-1.5">
          <div>
            <p class="text-sm font-medium text-slate-900">{{ m.user.name }}</p>
            <p class="text-xs text-slate-400">{{ m.user.email }}</p>
          </div>
          <div class="flex items-center gap-2">
            @if (canManage && m.role !== 'owner' && (isOwner || m.userId !== currentUserId)) {
              <select
                [value]="m.role"
                (change)="onRoleSelect(m.userId, $event)"
                class="text-xs rounded border border-slate-300 px-1.5 py-1"
              >
                @for (r of roles; track r) {
                  @if (r !== 'owner' || isOwner) {
                    <option [value]="r">{{ r }}</option>
                  }
                }
              </select>
              <button (click)="removeMember.emit(m.userId)" class="text-slate-400 hover:text-red-500 text-xs">
                ✕
              </button>
            } @else {
              <span class="text-xs font-medium text-slate-500">{{ m.role }}</span>
            }
          </div>
        </div>
      }
    </div>

    @if (canManage) {
      <form [formGroup]="inviteForm" (ngSubmit)="submitInvite()" class="flex gap-2 mt-4 pt-4 border-t border-slate-100">
        <input
          formControlName="email"
          placeholder="Invite by email"
          class="flex-1 rounded-lg border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
        />
        <button type="submit" class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium rounded-lg px-4 py-2 transition">
          Invite
        </button>
      </form>
    }

    <div class="flex justify-end mt-4">
      <button (click)="close.emit()" class="text-sm font-medium text-slate-500 px-4 py-2">Close</button>
    </div>
  </div>
</div>
