<div class="min-h-screen flex items-center justify-center bg-slate-50 px-4">
  <div class="w-full max-w-sm bg-white rounded-xl shadow-sm border border-slate-200 p-8">
    <h1 class="text-2xl font-bold text-slate-900 mb-1">Create your account</h1>
    <p class="text-slate-500 text-sm mb-6">Start organizing your boards</p>

    <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Name</label>
        <input
          type="text"
          formControlName="name"
          class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
        />
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Email</label>
        <input
          type="email"
          formControlName="email"
          class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
        />
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Password</label>
        <input
          type="password"
          formControlName="password"
          class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
        />
        <p class="text-xs text-slate-400 mt-1">At least 8 characters</p>
      </div>

      @if (errorMessage()) {
        <p class="text-sm text-red-600">{{ errorMessage() }}</p>
      }

      <button
        type="submit"
        [disabled]="submitting()"
        class="w-full bg-indigo-600 hover:bg-indigo-700 disabled:opacity-50 text-white font-medium rounded-lg py-2 text-sm transition"
      >
        {{ submitting() ? 'Creating account…' : 'Create account' }}
      </button>
    </form>

    <p class="text-sm text-slate-500 mt-6 text-center">
      Already have an account?
      <a routerLink="/login" class="text-indigo-600 font-medium hover:underline">Sign in</a>
    </p>
  </div>
</div>
