services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: focusflow
      MYSQL_USER: focusflow
      MYSQL_PASSWORD: focusflow_dev_password
      MYSQL_ROOT_PASSWORD: root_dev_password
    ports:
      - "3306:3306"
    volumes:
      - focusflow_mysql_data:/var/lib/mysql

volumes:
  focusflow_mysql_data:
